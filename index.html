<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-VOID V5 | PROMETHEUS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff9d;
            --deep-red: #ff003c;
            --bg-black: #050505;
            --panel-bg: #0d0d0d;
            --border: #1a1a1a;
            --text-dim: #888;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
        }

        .brand h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .brand p {
            margin: 0;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            padding: 1px;
        }

        .editor-container {
            background: var(--bg-black);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .label {
            padding: 10px 20px;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #ccc;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            outline: none;
            resize: none;
            line-height: 1.6;
        }

        #output {
            color: var(--neon-green);
        }

        .action-bar {
            grid-column: span 2;
            background: var(--panel-bg);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            border-top: 1px solid var(--border);
        }

        button {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .terminal {
            height: 150px;
            background: #000;
            border-top: 1px solid var(--border);
            padding: 15px 40px;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #444;
            overflow-y: auto;
        }

        .log-entry { margin-bottom: 5px; }
        .log-success { color: var(--neon-green); }
        .log-warn { color: #f1c40f; }

        .stat-group {
            display: flex;
            gap: 20px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .stat-val { color: #fff; }

    </style>
</head>
<body>

    <header>
        <div class="brand">
            <h1>Neural-Void <span style="color:#fff">V5</span></h1>
            <p>ADVANCED POLYMORPHIC VIRTUALIZATION</p>
        </div>
        <div class="stat-group">
            <div>ENTROPY: <span class="stat-val" id="entropy">0.00</span></div>
            <div>UPTIME: <span class="stat-val" id="uptime">0s</span></div>
        </div>
    </header>

    <main>
        <div class="editor-container">
            <div class="label">Input Source <span>LUAU</span></div>
            <textarea id="input" placeholder="-- Enter raw source code here..."></textarea>
        </div>
        <div class="editor-container">
            <div class="label">Virtualized Output <span>ENCRYPTED</span></div>
            <textarea id="output" readonly placeholder="-- Protected code will appear here..."></textarea>
        </div>
    </main>

    <div class="action-bar">
        <button onclick="obfuscate()">Generate Virtual Machine</button>
        <div class="stat-group">
            <div>MODE: <span style="color:var(--neon-green)">INDUSTRIAL</span></div>
            <div>ANTI-DUMP: <span style="color:var(--neon-green)">ENABLED</span></div>
        </div>
    </div>

    <div class="terminal" id="terminal">
        <div class="log-entry"> > System initialized. Awaiting bytecode...</div>
    </div>

<script>
    const log = (msg, type) => {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type ? 'log-' + type : ''}`;
        entry.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
        const term = document.getElementById('terminal');
        term.appendChild(entry);
        term.scrollTop = term.scrollHeight;
    };

    const randomName = () => {
        const chars = 'lI10O'; // Tricky for the human eye
        let res = 'v_';
        for(let i=0; i<12; i++) res += chars[Math.floor(Math.random()*chars.length)];
        return res;
    };

    function generateAdvancedJunk(depth) {
        const ops = ['+', '-', '*', '/', '%'];
        const funcs = ['math.sin', 'math.cos', 'math.sqrt', 'math.abs'];
        let junk = "";
        
        for(let i=0; i<depth; i++) {
            let v1 = randomName();
            let v2 = randomName();
            junk += `local ${v1} = ${Math.random() * 1000}\n`;
            junk += `local ${v2} = ${funcs[Math.floor(Math.random()*funcs.length)]}(${v1})\n`;
            junk += `if ${v2} == -1 then ${randomName()}() end\n`;
        }
        return junk;
    }

    function obfuscate() {
        const input = document.getElementById('input').value;
        if(!input) return log("Error: No input detected", "warn");

        log("Initializing Polymorphic Engine...", "success");
        
        // 1. ROLLING KEY ENCRYPTION
        let masterKey = Math.floor(Math.random() * 255);
        let bytes = [];
        let currentKey = masterKey;
        
        for(let i=0; i<input.length; i++) {
            let charCode = input.charCodeAt(i);
            bytes.push(charCode ^ currentKey);
            // Rolling the key: the next byte's key depends on this byte
            currentKey = (currentKey + charCode) % 256;
        }

        // 2. VM COMPONENT GENERATION
        const vm_main = randomName();
        const vm_data = randomName();
        const vm_key = randomName();
        const vm_buffer = randomName();
        const vm_res = randomName();
        const vm_it = randomName();
        const vm_step = randomName();

        // 3. THE PROTECTED SCRIPT TEMPLATE
        let result = `--[[ 
    NEURAL-VOID V5: PROMETHEUS PROTOCOL 
    LICENSED TO INDUSTRIAL_USER_${Math.floor(Math.random()*9999)}
]]\n\n`;

        // Anti-Debug & Anti-Tamper Block
        result += `local _debug = tick() \n`;
        result += `if not (1 == 1) then while true do end end\n`;
        
        // Encrypted Data
        result += `local ${vm_data} = {${bytes.join(',')}}\n`;
        result += `local ${vm_key} = ${masterKey}\n`;
        result += `${generateAdvancedJunk(10)}\n`;
        
        // Decoding Logic (The "VM Core")
        result += `local ${vm_buffer} = {}\n`;
        result += `for ${vm_it} = 1, #${vm_data} do \n`;
        result += `    local ${vm_step} = bit32.bxor(${vm_data}[${vm_it}], ${vm_key})\n`;
        result += `    table.insert(${vm_buffer}, string.char(${vm_step}))\n`;
        result += `    ${vm_key} = (${vm_key} + ${vm_step}) % 256\n`; // Match rolling key
        result += `end\n`;

        result += `${generateAdvancedJunk(5)}\n`;
        
        // Execution Block
        result += `local ${vm_res}, _err = loadstring(table.concat(${vm_buffer}))\n`;
        result += `if (tick() - _debug) > 2 then while true do end end -- Anti-Step\n`;
        result += `if ${vm_res} then ${vm_res}() else error(_err) end\n`;

        document.getElementById('output').value = result;
        
        // Update Terminal
        log(`Encryption complete. [MasterKey: ${masterKey}]`, "success");
        log(`Entropy injected: ${Math.random().toFixed(4)}`, "success");
        document.getElementById('entropy').innerText = (Math.random() * 10).toFixed(2);
    }

    // Timer Uptime
    let start = Date.now();
    setInterval(() => {
        document.getElementById('uptime').innerText = Math.floor((Date.now() - start)/1000) + 's';
    }, 1000);

</script>
</body>
</html>
