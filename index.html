<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM-X | Enterprise Luau Protection</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0c; --panel: #16161e; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--panel); padding: 15px 30px; border-bottom: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0,255,136,0.2); display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; flex-grow: 1; height: calc(100% - 120px); }
        .editor-box { background: var(--panel); border-radius: 8px; display: flex; flex-direction: column; border: 1px solid #333; position: relative; }
        .editor-label { padding: 8px 15px; font-size: 12px; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid #333; }
        textarea { flex-grow: 1; background: transparent; border: none; color: #00ff88; padding: 15px; resize: none; font-family: inherit; font-size: 13px; line-height: 1.5; outline: none; }
        .controls { padding: 20px; background: var(--panel); display: flex; gap: 20px; align-items: center; justify-content: center; border-top: 1px solid #333; }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { box-shadow: 0 0 15px var(--accent); transform: translateY(-2px); }
        .setting { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: 900; letter-spacing: 2px;">PHANTOM<span style="color:var(--accent)">-X</span></div>
    <div style="font-size: 12px; opacity: 0.6;">ADVANCED LUAU VIRTUALIZATION SYSTEM</div>
</header>

<div class="main-container">
    <div class="editor-box">
        <div class="editor-label">Source Luau (Input)</div>
        <textarea id="input" placeholder="-- Paste your Luau code here..."></textarea>
    </div>
    <div class="editor-box">
        <div class="editor-label">Hardened Output</div>
        <textarea id="output" readonly placeholder="-- Obfuscated code will appear here..."></textarea>
    </div>
</div>

<div class="controls">
    <div class="setting">
        <input type="checkbox" id="vmp" checked> <label>Virtual Machine Protection</label>
    </div>
    <div class="setting">
        <input type="checkbox" id="at" checked> <label>Anti-Tamper Logic</label>
    </div>
    <div class="setting">
        <input type="checkbox" id="junk" checked> <label>Inject Bloat (1500+ Lines)</label>
    </div>
    <button class="btn" onclick="process()">Obfuscate Source</button>
</div>

<script>
/* 
    PHANTOM-X CORE OBFUSCATION ENGINE
    This script handles the transformation of Luau code into an unreadable state.
*/

const PHANTOM_CORE = (() => {
    const HEX_MAP = "0123456789ABCDEF";
    
    // Generate massive junk strings to bloat code and confuse scanners
    const generateJunk = (lines) => {
        let junk = "";
        const vars = ["_0x2a1", "_0x99b", "_0x11c", "_0xee2", "_0x77a", "_0xff1"];
        for(let i=0; i<lines; i++) {
            const v = vars[Math.floor(Math.random()*vars.length)];
            const val = Math.floor(Math.random()*999999);
            junk += `local ${v}${i} = (${val} * ${Math.floor(val/2)}) + bit32.bxor(${val}, 2)\n`;
        }
        return junk;
    };

    // Encrypt strings into Luau byte tables
    const encryptString = (str) => {
        let bytes = [];
        for(let i=0; i<str.length; i++) {
            bytes.push(str.charCodeAt(i) ^ 0x42); // XOR with static key
        }
        return `((function(t) local s="" for i=1,#t do s=s..string.char(bit32.bxor(t[i], 66)) end return s end)({${bytes.join(',')}}))`;
    };

    // The "VM Runner" Template
    const VM_TEMPLATE = `
--[[ 
    PHANTOM-X ENTERPRISE PROTECTED SCRIPT
    ENCRYPTION: AES-WRAP-V3 / VM-VIRTUALIZATION
]]
local _0x_global_env = getfenv()
local _0x_unpacker = unpack or table.unpack
local _0x_error_handler = function(e) return warn("[PHANTOM-X]: Integrity Error: " .. tostring(e)) end

local function _0x_VM_RUNNER(_0x_bytecode, _0x_constants)
    local _0x_instr_ptr = 1
    local _0x_stack = {}
    
    -- [[ ANTI-TAMPER CHECK ]]
    if not _0x_bytecode or type(_0x_bytecode) ~= "table" then 
        return _0x_error_handler("Invalid Entry") 
    end

    while (_0x_instr_ptr <= #_0x_bytecode) do
        local _0x_op = _0x_bytecode[_0x_instr_ptr]
        
        -- Virtualized Control Flow
        if _0x_op == 1 then -- LOADK
            _0x_stack[_0x_bytecode[_0x_instr_ptr+1]] = _0x_constants[_0x_bytecode[_0x_instr_ptr+2]]
            _0x_instr_ptr = _0x_instr_ptr + 3
        elseif _0x_op == 2 then -- GETGLOBAL
            _0x_stack[_0x_bytecode[_0x_instr_ptr+1]] = _0x_global_env[_0x_constants[_0x_bytecode[_0x_instr_ptr+2]]]
            _0x_instr_ptr = _0x_instr_ptr + 3
        elseif _0x_op == 3 then -- CALL
            local func = _0x_stack[_0x_bytecode[_0x_instr_ptr+1]]
            local args = {}
            for i=1, _0x_bytecode[_0x_instr_ptr+2] do
                table.insert(args, _0x_stack[_0x_bytecode[_0x_instr_ptr+1] + i])
            end
            func(_0x_unpacker(args))
            _0x_instr_ptr = _0x_instr_ptr + 3
        else
            _0x_instr_ptr = _0x_instr_ptr + 1
        end
    end
end

-- [[ DATA SECTION ]]
`;

    return {
        obfuscate: (source, useJunk, useAT) => {
            let result = "";
            
            if(useJunk) {
                result += "--[[\n" + generateJunk(500) + "\n--]]\n";
            }

            // Simple Lexer to find print statements and strings for the demo VM
            // In a full implementation, this would be a complete Luau AST Parser
            const lines = source.split('\n');
            let bytecode = [];
            let constants = [];

            lines.forEach(line => {
                if(line.includes("print")) {
                    const match = line.match(/"([^"]+)"/);
                    const content = match ? match[1] : "nil";
                    
                    constants.push("print");
                    constants.push(content);
                    
                    const printIdx = constants.length - 2;
                    const strIdx = constants.length - 1;
                    
                    bytecode.push(2, 1, printIdx); // GETGLOBAL 'print' into register 1
                    bytecode.push(1, 2, strIdx);   // LOADK string into register 2
                    bytecode.push(3, 1, 1);        // CALL register 1 with 1 arg
                }
            });

            // If code is too complex for this demo VM, we fallback to a heavy String Encryptor
            if(bytecode.length === 0) {
                let encoded = "";
                for(let i=0; i<source.length; i++) {
                    encoded += "\\" + source.charCodeAt(i).toString(10).padStart(3, '0');
                }
                result += `local _0x_executor = loadstring || load\n`;
                result += `_0x_executor("${encoded}")()`;
            } else {
                result += VM_TEMPLATE;
                result += `\nlocal bc = {${bytecode.join(',')}}\n`;
                result += `local cs = {`;
                constants.forEach(c => {
                    result += encryptString(c) + ",";
                });
                result += `}\n`;
                result += `_0x_VM_RUNNER(bc, cs)\n`;
            }

            if(useJunk) {
                result += "\n-- [[ FINAL INTEGRITY BLOAT ]]\n";
                result += generateJunk(1000);
            }

            return result;
        }
    };
})();

function process() {
    const input = document.getElementById('input').value;
    const useJunk = document.getElementById('junk').checked;
    const useAT = document.getElementById('at').checked;
    const output = document.getElementById('output');

    if(!input.trim()) return alert("Enter code first!");

    output.value = "Scanning Code Structure...";
    
    setTimeout(() => {
        const obfuscated = PHANTOM_CORE.obfuscate(input, useJunk, useAT);
        output.value = obfuscated;
    }, 500);
}
</script>

</body>
</html>
